<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>メンバー（順不同)</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2em;
      text-align: center;
      line-height: 1.8;
      background: #f0fff4;
      position: relative;
    }

   h1 {
      position: relative;
      z-index: 10;
      font-size: 5vw;
    }
    
    ul {
      list-style: none;
      padding: 0;
      font-size: 4vw;
      margin-bottom: 2em;
    }

   a {
      display: inline-block;
      margin-top: 1.5em;
      padding: 1em 1.5em;
      background: #2e7d32;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 4vw;
    }

    a:hover {
      background: #388e3c;
    }

   


    /* クローバー絵文字のアニメーション */
    .clover {
      position: absolute;
      font-size: 28px;
      animation: float 10s linear infinite;
      opacity: 0.8;
      user-select: none;
      pointer-events: none;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
      }
      100% {
        transform: translateY(-120vh) rotate(360deg);
      }
    }

     @media (min-width: 1024px) {
      h1 { font-size: 28px; }
      ul { font-size: 20px; }
      a  { font-size: 20px; }
    }
  </style>
</head>
<body>

 <h1>メンバー（順不同）</h1>

  <ul>
    <li>立石千鶴子さん</li>
    <li>Atsuko Tsushimaさん</li>
    <li>あさいさん</li>
    <li>Mayumi Sakagamiさん</li>
    <li>AKIKO MASUDAYAさん</li>
    <li>松木純子さん</li>
    <li>Aki Kankeさん</li>
    <li>Youko Itagakiさん</li>
    <li>北川 杏子さん</li>
    <li>槇野 未来さん</li>
    <li>〇〇〇〇さん</li>
    <li>〇〇〇〇さん</li>
    <li>〇〇〇〇さん</li>
    <li>〇〇〇〇さん</li>
    <li>〇〇〇〇さん</li>
    <li>〇〇〇〇さん</li>
  </ul>

  <a href="./index.html">メッセージに戻る</a>

  <script>
    // クローバー絵文字をランダムに生成
    for (let i = 0; i < 25; i++) {
      const clover = document.createElement('div');
      clover.classList.add('clover');
      clover.textContent = '🍀';

      // ランダム配置
      clover.style.left = Math.random() * 100 + 'vw';
      clover.style.animationDuration = 8 + Math.random() * 6 + 's';
      clover.style.opacity = 0.5 + Math.random() * 0.5;
      clover.style.fontSize = (20 + Math.random() * 20) + 'px';

      document.body.appendChild(clover);
    }
  </script>

</body>
</html>
