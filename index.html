<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HappyBirthday</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 1.5em;
      margin: 0;
      background: #fefefe;
    }
    h1 {
      font-size: 1.3em;
      margin-bottom: 0.5em;
    }
    .subtext {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 2em;
    }
    #gachaIcon {
      width: 40vw;
      max-width: 120px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #gachaIcon:hover {
      transform: scale(1.1);
    }
    #result {
      margin-top: 2em;
      font-size: 1em;
      font-weight: bold;
      line-height: 1.5;
      white-space: pre-line;
      padding: 0 1em;
    }
  </style>
</head>
    
<body>
  <h1>
    お誕生日おめでとう<br>
    ホソジュン！
  </h1>
  2026年6月の細野純子さんへ

  <p class="subtext">アイコンをタップしてね</p>

  <!-- ガチャアイコン -->
  <div>
    <img src="./Copilot_20260529_205407.png" alt="ガチャを回す" id="gachaIcon" onclick="pickRandom()">
  </div>
 
  <!-- ループ再生する音 -->
  <audio id="doorSound" src="./wavemaster-happy-birthday-jazz-171120.mp3" preload="auto" loop></audio>

  <!-- 結果表示 -->
  <div id="result"></div>

  <script>
    let data = [];
    let isSoundStarted = false;

    // CSVファイルを自動読み込み
    fetch('./menu.csv')
      .then(response => {
        if (!response.ok) {
          throw new Error('CSVファイルの読み込みに失敗しました');
        }
        return response.text();
      })
      .then(text => {
        // trim() を使わず、空行だけ除去する
        const lines = text
          .split('\n')
          .filter(line => line.trim() !== '') // 空行除去
          .slice(1); // ヘッダー除去

        data = lines.map(line => {
          const cols = line.split(',');

          while (cols.length < 6) {
            cols.push("");
          }

          const [menu, comment, mood, mood2, mood3, name] = cols.map(v => v.trim());
          return { menu, comment, mood, mood2, mood3, name };
        }).filter(item => item.menu);

        console.log('CSV読み込み成功:', data);
      })
      .catch(error => {
        console.error('CSV読み込みエラー:', error);
        document.getElementById('result').innerText = '⚠️ メニューの読み込みに失敗しました';
      });

    // ガチャを回す処理
    function pickRandom() {

      // 最初のクリックでだけ音を鳴らす
      if (!isSoundStarted) {
        const sound = document.getElementById('doorSound');
        sound.play().catch(error => console.error('音声再生エラー:', error));
        isSoundStarted = true;
      }

      if (data.length === 0) {
        document.getElementById('result').innerText = '⚠️ メニューが読み込まれていません';
        return;
      }

      const item = data[Math.floor(Math.random() * data.length)];

      const text = [
        item.menu,
        item.comment,
        item.mood,
        item.mood2,
        item.mood3,
        item.name
      ].filter(v => v).join('\n');

      document.getElementById('result').innerText = text;
    }


    // 長押し判定用
    let pressTimer;
    
    const icon = document.getElementById('gachaIcon');
    
    // PC用
    icon.addEventListener('mousedown', startPress);
    icon.addEventListener('mouseup', cancelPress);
    icon.addEventListener('mouseleave', cancelPress);
    
    // スマホ用
    icon.addEventListener('touchstart', startPress);
    icon.addEventListener('touchend', cancelPress);
    
    function startPress() {
      pressTimer = setTimeout(() => {
        // ★ 長押し成功 → 別ページへ
        window.location.href = "./secret.html"; 
      }, 5000); // 長押し判定時間
    }
    
    function cancelPress() {
      clearTimeout(pressTimer);
    }

  </script>
</body>
</html>
